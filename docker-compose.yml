services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - data:/app/data
    environment:
      - GH_TOKEN=${GH_TOKEN}
      - GH_TRACKER_PUBLIC_ONLY=${GH_TRACKER_PUBLIC_ONLY:-false}
      - GH_TRACKER_DB=/app/data/metrics.db
      - GH_WEBHOOK_SECRET=${GH_WEBHOOK_SECRET:-}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  collector:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - data:/app/data
    environment:
      - GH_TOKEN=${GH_TOKEN}
      - GH_TRACKER_PUBLIC_ONLY=${GH_TRACKER_PUBLIC_ONLY:-false}
      - GH_TRACKER_DB=/app/data/metrics.db
    command: python collect_live.py
    profiles:
      - collect

volumes:
  data:
